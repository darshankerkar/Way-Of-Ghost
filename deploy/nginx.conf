# /etc/nginx/sites-available/gdg-spectrum
# Copy this file: sudo cp deploy/nginx.conf /etc/nginx/sites-available/gdg-spectrum
# Enable it:      sudo ln -sf /etc/nginx/sites-available/gdg-spectrum /etc/nginx/sites-enabled/
# Remove default: sudo rm -f /etc/nginx/sites-enabled/default
# Test config:    sudo nginx -t
# Reload:         sudo systemctl reload nginx

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Upstream for the Express server
upstream backend {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;  # <-- Replace with your domain or EC2 public IP

    # --- API & WebSocket Proxy ---
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Socket.io - WebSocket support
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Optional: Serve client build from EC2 ---
    # Uncomment this block if you want to serve the frontend from EC2
    # instead of using S3 + CloudFront or Vercel
    #
    # location / {
    #     root /home/ubuntu/gdg-spectrum/client/dist;
    #     index index.html;
    #     try_files $uri $uri/ /index.html;
    #
    #     # Cache static assets
    #     location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
    #         expires 30d;
    #         add_header Cache-Control "public, immutable";
    #     }
    # }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Max upload size
    client_max_body_size 10M;
}
